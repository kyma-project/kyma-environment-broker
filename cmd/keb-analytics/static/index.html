<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>KEB Analytics</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4"></script>
  <style>
    body { font-family: sans-serif; margin: 2rem; }
    .chart-container { max-width: 800px; margin: 2rem 0; }
    h2 { margin-top: 2rem; }
    #error { color: red; }
    #controls { display: flex; align-items: center; gap: 1rem; margin-bottom: 1rem; }
    #controls label { font-weight: bold; }
  </style>
</head>
<body>
  <h1>KEB Parameter Usage Analytics</h1>

  <div id="controls">
    <label for="period">Period:</label>
    <select id="period">
      <option value="7">Last 7 days</option>
      <option value="30">Last 30 days</option>
      <option value="90">Last 90 days</option>
      <option value="">All time</option>
    </select>
  </div>

  <p id="total"></p>
  <p id="error"></p>

  <h2>Provisioning Parameters</h2>
  <div class="chart-container"><canvas id="provChart"></canvas></div>

  <h2>Update Parameters</h2>
  <div class="chart-container"><canvas id="updateChart"></canvas></div>

  <h2>Value Distributions</h2>
  <div id="distributions"></div>

  <script>
    const charts = [];

    function destroyCharts() {
      charts.forEach(c => c.destroy());
      charts.length = 0;
    }

    async function load() {
      destroyCharts();
      document.getElementById('distributions').innerHTML = '';
      document.getElementById('error').textContent = '';

      const days = document.getElementById('period').value;
      let url = '/api/stats';
      if (days) {
        const from = new Date();
        from.setUTCDate(from.getUTCDate() - parseInt(days));
        const fromStr = from.toISOString().slice(0, 10);
        url += '?from=' + fromStr;
      }

      let data;
      try {
        const resp = await fetch(url);
        data = await resp.json();
      } catch(e) {
        document.getElementById('error').textContent = 'Failed to load stats: ' + e;
        return;
      }

      document.getElementById('total').textContent =
        'Total active instances: ' + data.total_instances;

      function renderBar(canvasId, stats) {
        if (!stats || !stats.parameters || stats.parameters.length === 0) return;
        const labels = stats.parameters.map(p => p.parameter);
        const pct = stats.parameters.map(p =>
          p.total > 0 ? ((p.set_count / p.total) * 100).toFixed(1) : 0
        );
        const chart = new Chart(document.getElementById(canvasId), {
          type: 'bar',
          data: {
            labels,
            datasets: [{ label: '% instances with parameter set', data: pct,
              backgroundColor: 'rgba(54,162,235,0.6)' }]
          },
          options: { indexAxis: 'y', scales: { x: { max: 100 } } }
        });
        charts.push(chart);
      }

      renderBar('provChart', data.provisioning);
      renderBar('updateChart', data.updates);

      const distDiv = document.getElementById('distributions');
      (data.distributions || []).forEach(dist => {
        const wrapper = document.createElement('div');
        wrapper.className = 'chart-container';
        const title = document.createElement('h3');
        title.textContent = dist.parameter;
        const canvas = document.createElement('canvas');
        canvas.id = 'dist_' + dist.parameter;
        wrapper.appendChild(title);
        wrapper.appendChild(canvas);
        distDiv.appendChild(wrapper);

        const labels = Object.keys(dist.values);
        const vals = Object.values(dist.values);
        const chart = new Chart(canvas, {
          type: 'bar',
          data: {
            labels,
            datasets: [{ label: 'count', data: vals,
              backgroundColor: 'rgba(255,159,64,0.6)' }]
          },
          options: { scales: { y: { ticks: { stepSize: 1, precision: 0 } } } }
        });
        charts.push(chart);
      });
    }

    document.getElementById('period').addEventListener('change', load);
    load();
  </script>
</body>
</html>
