apiVersion: apps/v1
kind: Deployment
metadata:
  name: keb-observability
  labels:
    app.kubernetes.io/name: keb-observability
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      app.kubernetes.io/name: keb-observability
  template:
    metadata:
      labels:
        app.kubernetes.io/name: keb-observability
    spec:
      containers:
        - name: keb-observability
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          command: ["python3", "/app/server.py"]
          ports:
            - name: http
              containerPort: 8080
          volumeMounts:
            - name: keb-observability-content
              mountPath: /app
        - name: oauth2-proxy
          image: "{{ .Values.oauth2Proxy.image.repository }}:{{ .Values.oauth2Proxy.image.tag }}"
          args:
            - --provider=oidc
            - --oidc-issuer-url={{ .Values.oidc.issuer }}
            - --client-id={{ .Values.oauth2Proxy.clientID }}
            - --client-secret=$(OAUTH2_PROXY_CLIENT_SECRET)
            - --redirect-url=https://{{ .Values.host }}.{{ .Values.global.ingress.domainName }}/oauth2/callback
            - --upstream=http://localhost:8080
            - --http-address=0.0.0.0:4180
            - --code-challenge-method=S256
            - --scope=openid email groups
            - --allowed-group={{ .Values.oidc.groups.admin }}
            - --allowed-group={{ .Values.oidc.groups.operator }}
            - --allowed-group={{ .Values.oidc.groups.viewer }}
            - --email-domain=*
            - --cookie-secure=true
            - --cookie-refresh=1h
            - --skip-provider-button=true
          env:
            - name: OAUTH2_PROXY_CLIENT_SECRET
              valueFrom:
                secretKeyRef:
                  name: keb-observability-oauth2-proxy
                  key: client-secret
            - name: OAUTH2_PROXY_COOKIE_SECRET
              valueFrom:
                secretKeyRef:
                  name: keb-observability-oauth2-proxy
                  key: cookie-secret
          ports:
            - name: oauth2-proxy
              containerPort: 4180
      volumes:
        - name: keb-observability-content
          configMap:
            name: keb-observability-content
