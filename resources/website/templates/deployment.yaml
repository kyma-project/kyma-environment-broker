apiVersion: apps/v1
kind: Deployment
metadata:
  name: website
  labels:
    app.kubernetes.io/name: website
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      app.kubernetes.io/name: website
  template:
    metadata:
      labels:
        app.kubernetes.io/name: website
    spec:
      containers:
        - name: website
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          ports:
            - name: http
              containerPort: 80
        - name: oauth2-proxy
          image: "{{ .Values.oauth2Proxy.image.repository }}:{{ .Values.oauth2Proxy.image.tag }}"
          args:
            - --provider=oidc
            - --oidc-issuer-url={{ .Values.oidc.issuer }}
            - --client-id={{ .Values.oauth2Proxy.clientID }}
            - --client-secret=$(OAUTH2_PROXY_CLIENT_SECRET)
            - --redirect-url=https://{{ .Values.host }}.{{ .Values.global.ingress.domainName }}/oauth2/callback
            - --upstream=http://localhost:80
            - --http-address=0.0.0.0:4180
            - --code-challenge-method=S256
            - --email-domain=*
            - --cookie-secure=true
            - --cookie-refresh=1h
            - --skip-provider-button=true
          env:
            - name: OAUTH2_PROXY_CLIENT_SECRET
              valueFrom:
                secretKeyRef:
                  name: website-oauth2-proxy
                  key: client-secret
            - name: OAUTH2_PROXY_COOKIE_SECRET
              valueFrom:
                secretKeyRef:
                  name: website-oauth2-proxy
                  key: cookie-secret
          ports:
            - name: oauth2-proxy
              containerPort: 4180
