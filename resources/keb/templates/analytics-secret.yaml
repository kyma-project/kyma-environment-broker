{{- if .Values.analytics.enabled }}
{{- if and (eq .Values.manageSecrets true) .Values.analytics.oauth2Proxy.enabled }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ .Values.analytics.name }}-oauth2-proxy
  namespace: {{ .Release.Namespace }}
type: Opaque
stringData:
  client-id: {{ .Values.analytics.oauth2Proxy.clientID | required "Please specify .Values.analytics.oauth2Proxy.clientID" | quote }}
  client-secret: {{ .Values.analytics.oauth2Proxy.clientSecret | required "Please specify .Values.analytics.oauth2Proxy.clientSecret" | quote }}
  cookie-secret: {{ .Values.analytics.oauth2Proxy.cookieSecret | required "Please specify .Values.analytics.oauth2Proxy.cookieSecret" | quote }}
{{- end }}
{{- end }}
