apiVersion: security.istio.io/v1beta1
kind: AuthorizationPolicy
metadata:
  name: istio-passthrough
  namespace: kcp-system
spec:
  action: ALLOW
  rules:
    - from:
        - source:
            namespaces:
              - istio-system
      to:
        - operation:
            methods:
              - GET
            paths:
              - /kubeconfig*
              {{- if .Values.swagger.virtualService.enabled }}
              - /
              - /swagger*
              - /schema*
              {{- end }}
{{- if not .Values.global.istio.ambient.enabled }}
  selector:
    matchLabels:
      app.kubernetes.io/name: {{ include "kyma-env-broker.name" . }}
      app.kubernetes.io/instance: {{ .Values.namePrefix }}
{{ else }}
  targetRefs:
  - kind: Service
    group: ""
    name: {{ include "kyma-env-broker.name" . }}
{{- end }}
