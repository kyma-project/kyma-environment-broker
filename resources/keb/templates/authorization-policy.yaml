---
apiVersion: security.istio.io/v1beta1
kind: AuthorizationPolicy
metadata:
  name: istio-oauth2
  namespace: kcp-system
spec:
  action: ALLOW
  rules:
  - to:
    - operation:
        methods:
        - GET
        - PUT
        - PATCH
        - DELETE
        paths:
        - /oauth/*
    from:
      - source:
          requestPrincipals:
          {{- if .Values.oidc.issuers }}
          {{- range $i, $p := .Values.oidc.issuers }}
          - {{ $p}}/*
          {{- end }}
          {{- else }}
          - {{ tpl .Values.oidc.issuer $ }}/*
          {{- end }}
    when:
    - key: request.auth.claims[scp]
      values:
      - broker:write
{{- if not .Values.global.istio.ambient.enabled }}
  selector:
    matchLabels:
      app.kubernetes.io/name: {{ include "kyma-env-broker.name" . }}
      app.kubernetes.io/instance: {{ .Values.namePrefix }}
{{ else }}
  targetRefs:
  - kind: Service
    group: ""
    name: {{ include "kyma-env-broker.fullname" . }}
{{- end }}
---
apiVersion: security.istio.io/v1beta1
kind: AuthorizationPolicy
metadata:
  name: istio-runtimes
  namespace: kcp-system
spec:
  action: ALLOW
  rules:
  - to:
    - operation:
        methods:
        - GET
        paths:
        - /runtimes
    from:
      - source:
          requestPrincipals:
          {{- if .Values.oidc.issuers }}
          {{- range $i, $p := .Values.oidc.issuers }}
          - {{ $p}}/*
          {{- end }}
          {{- else }}
          - {{ tpl .Values.oidc.issuer $ }}/*
          {{- end }}
    when:
    - key: request.auth.claims[groups]
      values:
      - {{ .Values.oidc.groups.admin }}
      - {{ .Values.oidc.groups.operator }}
      - {{ .Values.oidc.groups.viewer }}
  - to:
    - operation:
        methods:
        - GET
        paths:
        - /runtimes
    from:
    - source:
        principals:
{{- with .Values.runtimeAllowedPrincipals }}
{{ tpl . $ | indent 10 }}
{{- end }}
{{- if not .Values.global.istio.ambient.enabled }}
  selector:
    matchLabels:
      app.kubernetes.io/name: {{ include "kyma-env-broker.name" . }}
      app.kubernetes.io/instance: {{ .Values.namePrefix }}
{{- else }}
  targetRefs:
  - kind: Service
    group: ""
    name: {{ include "kyma-env-broker.fullname" . }}
{{- end }}
